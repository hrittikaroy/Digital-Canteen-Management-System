<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Canteen - Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="navbar-brand">
                <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="#1e5a96"/>
                    <path d="M 50 20 L 70 40 L 70 70 L 30 70 L 30 40 Z" fill="#fff" stroke="#1e5a96" stroke-width="2"/>
                </svg>
                <span class="brand-text">Digital Canteen</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="orders.html">Orders</a></li>
                <li><a href="account.html" class="active">Account</a></li>
            </ul>
            <div class="nav-actions">
                <a href="index.html" class="btn btn-outline">Back to Home</a>
            </div>
        </div>
    </nav>

    <div class="menu-container" style="padding: 80px 20px;">
        <div style="max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 3px 15px rgba(0,0,0,0.12); padding: 40px;">
            <h1>Account</h1>
            <p>Your account details are shown here.</p>
            <div class="account-content" style="margin-top: 20px;">
                <p>Email: <strong id="accountEmail">Not logged in</strong></p>
                <p>Wallet balance: <strong id="accountBalance">₹0.00</strong></p>
                <p>Position and department are shown after login.</p>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (user) {
            document.getElementById('accountEmail').textContent = user.email;
            document.getElementById('accountBalance').textContent = '₹' + (user.wallet_balance || 0).toFixed(2);
        }
    </script>

    <footer class="footer" style="margin-top: 40px;">
        <div class="footer-content">
            <div class="footer-section">
                <h4>Support</h4>
                <p>canteen@company.com</p>
            </div>
        </div>
    </footer>
</body>
</html>
